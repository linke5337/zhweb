services:
  db:
    image: postgres:16-alpine
    container_name: zhweb_db
    environment:
      POSTGRES_USER: zhweb
      POSTGRES_PASSWORD: zhweb_password
      POSTGRES_DB: zhweb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhweb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: zhweb_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://zhweb:zhweb_password@db:5432/zhweb
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: zhweb_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
